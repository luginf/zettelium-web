<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zettelium</title>
<style>
/* CSS custom properties — set by JS via applyTheme() (app.js), same variable
   names as writhdeck-web so a future schemes.js-driven theme picker (phase 6)
   plugs in without renaming anything here. */
:root {
  --bg:      #1a1a1a;
  --fg:      #e8e8e8;
  --bg-bar:  #2a2a2a;
  --fg-bar:  #aaaaaa;
  --bg-sel:  #3a5a8a;
  --bg-sel-rgb: 58, 90, 138;
  --heading: #c8a060;
  --comment: #606060;
  --markup:  #6aa9d4;
  --bg2:     #1a1a1a;

  --font-family: system-ui, sans-serif;
  --font-size:   15px;

  /* Editor-specific (monospace, independent of the chrome font above) */
  --ed-font-family: monospace;
  --ed-font-size:   16px;
  --ed-line-spacing: 1.5;
  --ed-margin-x: 40px;
  --ed-margin-y: 24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  /* The page itself must never scroll — every screen is its own fixed
     100vh flex column with an explicit scrollable region inside (the
     textarea, a list, a dialog...). Without this, once an inner scrollable
     region (e.g. #ed-input) hits its own scroll limit, the scroll gesture
     chains up to the document itself, which silently pushes the "fixed"
     header out of view even though it's flex-shrink:0 in its own
     container — reported symptom: the editor's top bar scrolls away past
     the bottom of a note and you have to scroll back up to see it again. */
  overflow: hidden;
  background: var(--bg2);
  color: var(--fg);
  font-family: var(--font-family);
  font-size: var(--font-size);
}

.hint { color: var(--fg-bar); font-size: 0.85em; padding: 8px 12px; }

button {
  cursor: pointer;
  background: var(--bg-bar);
  color: var(--fg-bar);
  border: 1px solid transparent;
  padding: 3px 10px;
  font: inherit;
  font-size: 0.9em;
}
button:hover { border-color: var(--fg-bar); }
button:disabled { opacity: 0.4; cursor: default; }

.icon-btn { display: inline-flex; align-items: center; justify-content: center; padding: 3px 8px; }
.icon-btn svg { display: block; }
.icon-label-btn { display: inline-flex; align-items: center; gap: 6px; }
.icon-label-btn svg { display: block; flex-shrink: 0; }
/* Beats the plain `#editor-menu button { display: block }` rule below
   (same specificity family, but this one adds the class too) so the icon
   and label actually sit flex-aligned instead of just stacking inline. */
#editor-menu button.icon-label-btn { display: flex; align-items: center; gap: 8px; justify-content: flex-start; }
button:disabled:hover { border-color: transparent; }

input[type="text"], select {
  background: var(--bg-bar);
  color: var(--fg);
  border: 1px solid var(--fg-bar);
  font: inherit;
  padding: 3px 6px;
}

/* ─── Repository screen ───────────────────────────────────────────────── */
#repo-screen, #browser-screen, #settings-screen, #theme-list-screen, #theme-editor-screen {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
}
#repo-screen[hidden], #browser-screen[hidden], #settings-screen[hidden],
#theme-list-screen[hidden], #theme-editor-screen[hidden] { display: none; }

#repo-header, #browser-header, #settings-header, #theme-list-header, #theme-editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg-bar);
  flex-shrink: 0;
}
#repo-title, #browser-title {
  font-size: 1.15em;
  font-weight: bold;
  color: var(--fg);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#repo-list, #browser-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 4px 0;
}

.repo-item, .file-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  border-left: 4px solid transparent;
}
.repo-item:hover, .file-item:hover { background: var(--bg-bar); }

.repo-item-name, .file-item-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-item-meta {
  font-size: 0.75em;
  color: var(--fg-bar);
  white-space: nowrap;
}
.folder-item { color: var(--heading); font-weight: 500; }
.repo-item-reauth {
  color: var(--heading);
  border-color: var(--heading);
}
.repo-item-actions { display: flex; gap: 2px; }
.repo-item-actions button { padding: 1px 7px; }

/* ─── Browser search bar (always visible, phase 4 — replaces the old
   extensions bar, which moved to the global Settings screen below) ─────── */
#browser-search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-bar);
  border-top: 1px solid var(--bg2);
  flex-wrap: wrap;
}
#browser-search-mode { display: flex; gap: 2px; }
#browser-search-mode button.active { color: var(--fg); border-color: var(--heading); }
#browser-search-input { flex: 1; min-width: 120px; }

/* ─── Settings screen ──────────────────────────────────────────────────── */
#settings-body { padding: 4px 12px 16px; overflow-y: auto; overscroll-behavior: contain; }
.settings-section-title {
  margin-top: 16px;
  font-size: 0.8em;
  color: var(--fg-bar);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.settings-section-title:first-child { margin-top: 8px; }
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--bg-bar);
}
.settings-row input[type="text"], .settings-row select { flex: 1; max-width: 260px; }

/* Interrupteur à bascule (style Android `Switch`) — sous le capot, une
   vraie <input type="checkbox"> (accessibilité/JS de changement inchangés,
   seul le rendu visuel diffère d'une case à cocher native). Le libellé
   vient toujours en premier, l'interrupteur à la fin de la ligne (demande
   explicite : "met le label en premier et la coche ensuite"). */
.settings-switch-row { align-items: flex-start; }
.settings-row-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.settings-row-desc { font-size: 0.8em; color: var(--fg-bar); }
.switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; margin-top: 2px; }
.switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; z-index: 1; }
.switch-track {
  position: absolute;
  inset: 0;
  background: var(--bg-bar);
  border: 1px solid var(--fg-bar);
  border-radius: 11px;
  transition: background-color 0.15s;
}
.switch-track::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  top: 2px;
  background: var(--fg-bar);
  border-radius: 50%;
  transition: transform 0.15s, background-color 0.15s;
}
.switch input:checked + .switch-track { background: var(--bg-sel); border-color: var(--heading); }
.switch input:checked + .switch-track::before { transform: translateX(18px); background: var(--heading); }

.settings-stepper { display: flex; align-items: center; gap: 8px; }
.settings-stepper button { padding: 2px 10px; }
.settings-stepper-value {
  min-width: 3.5em;
  max-width: 4.5em;
  text-align: center;
  font-variant-numeric: tabular-nums;
  font: inherit;
  background: var(--bg-bar);
  color: var(--fg);
  border: 1px solid var(--fg-bar);
  padding: 2px 4px;
}
/* Masque les flèches natives du <input type=number> (Chrome/Edge) — les
   boutons -/+ existants les rendent redondantes. */
.settings-stepper-value::-webkit-inner-spin-button,
.settings-stepper-value::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.settings-stepper-value { -moz-appearance: textfield; }

.settings-radio-group { padding: 2px 0 8px; }
.settings-radio-row { display: flex; align-items: center; gap: 8px; padding: 6px 16px; cursor: pointer; }

.settings-full-width-btn { display: block; width: 100%; margin: 6px 0 10px; text-align: center; }

#settings-scheme-preview { padding: 4px 0; }
.scheme-preview-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.scheme-preview-swatches { display: flex; gap: 3px; }

.scheme-swatch {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 1px solid var(--fg-bar);
  border-radius: 2px;
}

/* ─── Theme list / editor screens ──────────────────────────────────────── */
#theme-list { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
.theme-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
}
.theme-row:hover { background: var(--bg-bar); }
.theme-row-swatches { display: flex; gap: 2px; }
.theme-row-swatches .scheme-swatch { width: 14px; height: 14px; }
.theme-row-name { flex: 1; }
.theme-row-active { color: var(--heading); }
.theme-row-actions { display: flex; gap: 2px; }
.theme-row-actions button { padding: 1px 7px; }

#theme-editor-body { flex: 1; overflow-y: auto; overscroll-behavior: contain; padding: 4px 12px; }
#theme-tabs { display: flex; gap: 4px; margin: 8px 0; }
#theme-tabs button.active { color: var(--fg); border-color: var(--heading); }

.theme-color-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
}
.theme-color-label { width: 96px; font-size: 0.85em; color: var(--fg-bar); flex-shrink: 0; }
.theme-color-hex { flex: 1; font-family: monospace; }
.theme-color-hex.invalid { border-color: #d04a4a; }
input[type="color"] { width: 32px; height: 28px; padding: 2px; border: 1px solid var(--fg-bar); background: var(--bg-bar); }

#theme-dup-body { padding: 8px 20px 4px; display: flex; flex-direction: column; gap: 4px; }
#settings-id-preview { padding: 8px 0 0; }

/* ─── Dialogs ───────────────────────────────────────────────────────────── */
dialog {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--fg-bar);
  padding: 0;
  width: min(480px, 92vw);
  max-height: 82vh;
}
dialog::backdrop { background: rgba(0, 0, 0, 0.5); }

#close-confirm-msg { padding: 16px 20px 4px; }
.dlg-btn-row { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; padding: 12px 20px 16px; }

/* ─── Editor ───────────────────────────────────────────────────────────── */
#editor-screen {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
}
#editor-screen[hidden] { display: none; }

#ed-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-bar);
  flex-shrink: 0;
}
#editor-title {
  flex: 1;
  font-size: 1.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#ed-actions { display: flex; gap: 6px; align-items: center; }

.editor-badge {
  display: inline-block;
  min-width: 14px;
  padding: 0 3px;
  margin-right: 3px;
  border-radius: 8px;
  background: var(--heading);
  color: var(--bg);
  font-size: 0.7em;
  line-height: 16px;
  text-align: center;
}
/* `.editor-badge`'s own `display` has the same specificity as the UA
   stylesheet's `[hidden] { display: none }` and comes later in the
   cascade, so it was winning and showing a "0" badge even when hidden was
   set — explicit override restores the expected behavior (no badge at
   all with zero backlinks, matching zettelium-android). */
.editor-badge[hidden] { display: none; }

#editor-menu-wrap { position: relative; }
#editor-menu {
  position: absolute;
  right: 0;
  top: 100%;
  margin-top: 4px;
  background: var(--bg-bar);
  border: 1px solid var(--fg-bar);
  z-index: 100;
  min-width: 220px;
  display: flex;
  flex-direction: column;
}
#editor-menu[hidden] { display: none; }
#editor-menu button {
  display: block;
  text-align: left;
  padding: 8px 14px;
  border: none;
  background: none;
  color: var(--fg);
  white-space: nowrap;
}
#editor-menu button:hover { background: var(--bg-sel); }
#editor-menu button[hidden] { display: none; }

/* `#ed-body` est une ligne flex (éditeur/aperçu + panneau TOC latéral en
   option, round 11) — le panneau, quand affiché, rétrécit réellement la
   colonne de l'éditeur (vrai partage de l'espace, pas une surimpression),
   même technique que writhdeck-web's `#ed-body`/`#toc-panel`. */
#ed-body {
  flex: 1;
  display: flex;
  flex-direction: row;
  overflow: hidden;
  background: var(--bg);
}

/* `#ed-main` reprend le rôle que jouait `#ed-body` avant round 11 (les
   deux panneaux édition/aperçu s'y superposent en position absolue selon
   le mode courant). */
#ed-main {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  min-width: 0; /* un enfant flex ne rétrécit pas sous son contenu par défaut */
}

#ed-wrap { position: absolute; inset: 0; }
#ed-wrap[hidden] { display: none; }

#ed-highlight,
#ed-input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  font-family: var(--ed-font-family);
  font-size: var(--ed-font-size);
  line-height: var(--ed-line-spacing);
  padding: var(--ed-margin-y) var(--ed-margin-x);
  margin: 0;
  border: none;
  outline: none;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
  tab-size: 4;
}
#ed-highlight {
  background: transparent;
  color: var(--fg);
  pointer-events: none;
  user-select: none;
  overflow: hidden;
}
#ed-input {
  background: transparent;
  color: transparent;
  caret-color: var(--fg);
  resize: none;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
  z-index: 1;
}
/* La sélection visible n'est PAS la sélection native du textarea (voir
   `editor.js` `updateSelectionHighlight()`) : elle est reconstruite comme un
   `Highlight` (CSS Custom Highlight API) sur le texte du `<pre>`
   #ed-highlight lui-même, peint DANS la même passe que les glyphes
   (fond d'abord, glyphes par-dessus, comme toute sélection normale — texte
   net, pleine opacité). Donner une couleur à `::selection` du vrai
   `<textarea>` le rendrait visible avec SES propres métriques de police,
   qui peuvent différer de quelques pixels de celles du `<pre>` dès qu'une
   ligne de titre plus haut dans le texte est agrandie (le textarea ne peut
   pas avoir une ligne plus haute qu'une autre) — texte sélectionné décalé
   verticalement. Un essai intermédiaire (fond de sélection natif rendu
   translucide plutôt que coloré) évitait le décalage mais "délavait" le
   texte, car ce fond était peint PAR-DESSUS les glyphes déjà rendus de
   l'overlay (z-index du textarea au-dessus du pre), pas en dessous.
   `.custom-highlight-supported` (posée par app.js si `CSS.highlights`
   existe — Chromium seulement, cohérent avec la contrainte déjà assumée
   pour la File System Access API) rend alors la sélection native
   totalement invisible ; en repli (navigateur sans l'API), on retombe sur
   l'ancien fond translucide plutôt que rien du tout. */
:root:not(.custom-highlight-supported) #ed-input::selection { background: rgba(var(--bg-sel-rgb), 0.65); }
.custom-highlight-supported #ed-input::selection { background: transparent; color: transparent; }
::highlight(ed-selection) { background-color: var(--bg-sel); }

.hl-line { display: inline-block; width: 100%; min-height: 1lh; vertical-align: top; }
.hl-heading { color: var(--heading); }
.hl-h1 { font-size: 1.8em; line-height: calc(var(--ed-line-spacing) / 1.8); }
.hl-h2 { font-size: 1.6em; line-height: calc(var(--ed-line-spacing) / 1.6); }
.hl-h3 { font-size: 1.4em; line-height: calc(var(--ed-line-spacing) / 1.4); }
.hl-h4 { font-size: 1.2em; line-height: calc(var(--ed-line-spacing) / 1.2); }
.hl-comment { color: var(--comment); }
.hl-markup { color: var(--markup); }

#ed-preview {
  position: absolute;
  inset: 0;
  overflow: auto;
  overscroll-behavior: contain;
  padding: var(--ed-margin-y) var(--ed-margin-x);
  font-family: var(--ed-font-family);
  font-size: var(--ed-font-size);
  line-height: var(--ed-line-spacing);
}
#ed-preview[hidden] { display: none; }
#ed-preview h1, #ed-preview h2, #ed-preview h3,
#ed-preview h4, #ed-preview h5, #ed-preview h6 { color: var(--heading); margin: 0.6em 0 0.3em; }
#ed-preview p { margin: 0.4em 0; }
#ed-preview code, #ed-preview .t2t-code { background: var(--bg-bar); }
#ed-preview .t2t-code { display: block; padding: 8px; overflow-x: auto; }
#ed-preview code { padding: 1px 4px; }
#ed-preview a { color: var(--markup); }
#ed-preview .zk-link { color: var(--markup); text-decoration: underline dotted; }
#ed-preview a.zk-link { cursor: pointer; }
#ed-preview .t2t-image-placeholder { color: var(--fg-bar); font-style: italic; }
#ed-preview table { border-collapse: collapse; margin: 0.4em 0; }
#ed-preview th, #ed-preview td { border: 1px solid var(--fg-bar); padding: 4px 8px; }
#ed-preview hr { border: none; border-top: 1px solid var(--fg-bar); margin: 1em 0; }

/* ─── Zettelkasten: link picker / backlinks / TOC (phases 5-6) ─────────── */
#zklink-picker-dlg, #backlinks-dlg, #toc-dlg, #backup-restore-dlg, #tag-browser-dlg { width: min(420px, 92vw); max-height: 70vh; display: flex; flex-direction: column; }
#zklink-picker-header, #backlinks-header, #toc-header, #backup-restore-header, #rename-note-header, #tag-browser-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-bar);
  flex-shrink: 0;
}
#zklink-filter { margin: 8px 12px; }
#zklink-list, #backlinks-list, #toc-list, #backup-restore-list, #tag-browser-list { overflow-y: auto; overscroll-behavior: contain; flex: 1; }

.tag-browser-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
}
.tag-browser-item:hover { background: var(--bg-bar); }
.tag-browser-tag { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-browser-count { color: var(--fg-bar); font-size: 0.8em; }

#rename-note-body { padding: 8px 20px; }
#rename-note-input { width: 100%; }

.backup-restore-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
}
.backup-restore-item:hover { background: var(--bg-bar); }
.backup-restore-date { flex-shrink: 0; font-size: 0.85em; }
.backup-restore-name { color: var(--fg-bar); font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Shared two-line item: file name first, then the note's first detected
   heading (if any) — never a redundant title/zkId, see editor.js
   renderNoteItem(). */
.zklink-item, .backlinks-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  cursor: pointer;
}
.zklink-item:hover, .backlinks-item:hover { background: var(--bg-bar); }
.note-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item-heading { font-size: 0.75em; color: var(--fg-bar); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; }

.toc-item {
  padding: 6px 12px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toc-item:hover { background: var(--bg-bar); }

/* ─── Panneau TOC latéral (round 11, sur le modèle de writhdeck-web) ────── */
#toc-panel {
  width: 240px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--bg-bar);
  background: var(--bg);
  overflow: hidden;
}
#toc-panel[hidden] { display: none; } /* voir la note sur [hidden] + display ailleurs dans ce fichier */
#toc-panel-header {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 10px;
  background: var(--bg-bar);
  flex-shrink: 0;
}
#toc-panel-header span:first-child { flex: 1; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#toc-panel-list { flex: 1; overflow-y: auto; overscroll-behavior: contain; }

/* ─── Repository options dialog ────────────────────────────────────────── */
#repo-options-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-bar);
}
#repo-options-body { padding: 4px 12px 12px; }
#repo-options-body .settings-row { border-bottom: none; }

/* ─── Per-note actions (create / rename / move / delete, round 8-gap) ──── */
.file-item-actions-btn { flex-shrink: 0; }

#new-note-header, #note-actions-header, #note-rename-header, #note-move-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-bar);
}
#new-note-body, #note-rename-body { padding: 8px 20px; }
#new-note-input, #note-rename-input { width: 100%; }

#note-actions-body { display: flex; flex-direction: column; padding: 4px 0; }
#note-actions-body button {
  display: flex;
  align-items: center;
  gap: 8px;
  text-align: left;
  padding: 10px 16px;
  border: none;
  background: none;
  color: var(--fg);
  width: 100%;
}
#note-actions-body button:hover { background: var(--bg-sel); }

#note-move-dlg { width: min(440px, 92vw); max-height: 78vh; display: flex; flex-direction: column; }
#note-move-body { padding: 4px 16px 8px; overflow-y: auto; overscroll-behavior: contain; flex: 1; }
#note-move-file { padding: 4px 0; }
#note-move-repo-row { border-bottom: none; }
#note-move-breadcrumb { font-size: 0.85em; color: var(--fg-bar); padding: 8px 0 4px; border-bottom: 1px solid var(--bg-bar); }
#note-move-list { max-height: 280px; overflow-y: auto; overscroll-behavior: contain; }
#note-move-list .file-item { padding: 6px 4px; cursor: pointer; }
#note-move-list .file-item svg { flex-shrink: 0; }

#external-conflict-dlg { width: min(440px, 92vw); }
#external-conflict-msg { padding: 16px 20px 4px; }

</style>
</head>
<body>

<!-- Repository list screen -->
<div id="repo-screen">
  <div id="repo-header">
    <span id="repo-title">Zettelium</span>
    <button id="repo-settings-btn" data-i18n-title="common.settings" class="icon-btn"></button>
    <button id="repo-add-btn" data-i18n-title="repo.addTooltip" data-i18n="repo.addButton"></button>
  </div>
  <p id="repo-empty-hint" class="hint" data-i18n="repo.emptyHint" hidden></p>
  <div id="repo-list"></div>
  <p class="hint" id="repo-support-hint"></p>
</div>

<!-- Global settings screen -->
<div id="settings-screen" hidden>
  <div id="settings-header">
    <button id="settings-back-btn" data-i18n-title="common.back">←</button>
    <span data-i18n="settings.screenTitle"></span>
  </div>
  <div id="settings-body">
    <p class="settings-section-title" data-i18n="settings.sectionTheme"></p>
    <div class="settings-radio-group" id="settings-theme-mode">
      <label class="settings-radio-row"><input type="radio" name="settings-theme-mode" value="system"> <span data-i18n="common.system"></span></label>
      <label class="settings-radio-row"><input type="radio" name="settings-theme-mode" value="light"> <span data-i18n="settings.themeLight"></span></label>
      <label class="settings-radio-row"><input type="radio" name="settings-theme-mode" value="dark"> <span data-i18n="settings.themeDark"></span></label>
    </div>
    <label class="settings-row"><span data-i18n="settings.paletteLabel"></span>
      <select id="settings-scheme"></select>
    </label>
    <div id="settings-scheme-preview">
      <div class="scheme-preview-row">
        <span class="hint" data-i18n="settings.themeDark"></span>
        <span id="settings-scheme-preview-dark" class="scheme-preview-swatches"></span>
      </div>
      <div class="scheme-preview-row">
        <span class="hint" data-i18n="settings.themeLight"></span>
        <span id="settings-scheme-preview-light" class="scheme-preview-swatches"></span>
      </div>
    </div>
    <button id="settings-edit-theme-btn" class="settings-full-width-btn" data-i18n="settings.editColors"></button>

    <p class="settings-section-title" data-i18n="settings.sectionEditor"></p>
    <label class="settings-row"><span data-i18n="settings.fontLabel"></span>
      <select id="settings-editor-font"></select>
    </label>
    <label class="settings-row"><span data-i18n="settings.fontSizeLabel"></span>
      <span class="settings-stepper">
        <button id="settings-font-size-dec" type="button">−</button>
        <input type="number" id="settings-font-size-value" class="settings-stepper-value" step="1">
        <button id="settings-font-size-inc" type="button">+</button>
      </span>
    </label>
    <label class="settings-row"><span data-i18n="settings.marginXLabel"></span>
      <span class="settings-stepper">
        <button id="settings-margin-x-dec" type="button">−</button>
        <input type="number" id="settings-margin-x-value" class="settings-stepper-value" step="4">
        <button id="settings-margin-x-inc" type="button">+</button>
      </span>
    </label>
    <label class="settings-row"><span data-i18n="settings.marginYLabel"></span>
      <span class="settings-stepper">
        <button id="settings-margin-y-dec" type="button">−</button>
        <input type="number" id="settings-margin-y-value" class="settings-stepper-value" step="4">
        <button id="settings-margin-y-inc" type="button">+</button>
      </span>
    </label>
    <label class="settings-row"><span data-i18n="settings.lineSpacingLabel"></span>
      <span class="settings-stepper">
        <button id="settings-line-spacing-dec" type="button">−</button>
        <input type="number" id="settings-line-spacing-value" class="settings-stepper-value" step="0.1">
        <button id="settings-line-spacing-inc" type="button">+</button>
      </span>
    </label>
    <label class="settings-row settings-switch-row">
      <span class="settings-row-info">
        <span data-i18n="settings.autosaveLabel"></span>
        <span class="settings-row-desc" data-i18n="settings.autosaveDesc"></span>
      </span>
      <span class="switch"><input type="checkbox" id="settings-autosave"><span class="switch-track"></span></span>
    </label>
    <label class="settings-row settings-switch-row">
      <span class="settings-row-info">
        <span data-i18n="settings.tocSidebarLabel"></span>
        <span class="settings-row-desc" data-i18n="settings.tocSidebarDesc"></span>
      </span>
      <span class="switch"><input type="checkbox" id="settings-toc-sidebar"><span class="switch-track"></span></span>
    </label>

    <p class="settings-section-title" data-i18n="settings.sectionLanguage"></p>
    <div class="settings-radio-group" id="settings-language">
      <label class="settings-radio-row"><input type="radio" name="settings-language" value="system"> <span data-i18n="common.system"></span></label>
      <!-- "Français"/"English" volontairement non traduits : dans un
           sélecteur de langue, chaque option s'affiche dans sa propre
           langue (même convention qu'Android's AppLanguage.nativeLabel). -->
      <label class="settings-radio-row"><input type="radio" name="settings-language" value="fr"> <span>Français</span></label>
      <label class="settings-radio-row"><input type="radio" name="settings-language" value="en"> <span>English</span></label>
    </div>

    <p class="settings-section-title" data-i18n="settings.sectionFiles"></p>
    <label class="settings-row"><span data-i18n="settings.extensionsLabel"></span>
      <input type="text" id="settings-extensions-input" autocomplete="off">
    </label>
    <label class="settings-row settings-switch-row">
      <span class="settings-row-info">
        <span data-i18n="settings.extensionsAllLabel"></span>
        <span class="settings-row-desc" data-i18n="settings.extensionsAllDesc"></span>
      </span>
      <span class="switch"><input type="checkbox" id="settings-extensions-all"><span class="switch-track"></span></span>
    </label>

    <p class="settings-section-title" data-i18n="settings.sectionZettelkasten"></p>
    <label class="settings-row"><span data-i18n="settings.idPatternLabel"></span>
      <input type="text" id="settings-id-pattern" autocomplete="off">
    </label>
    <label class="settings-row"><span data-i18n="settings.idFormatLabel"></span>
      <input type="text" id="settings-id-format" autocomplete="off">
    </label>
    <p id="settings-id-preview" class="hint"></p>
  </div>
</div>

<!-- Theme list screen -->
<div id="theme-list-screen" hidden>
  <div id="theme-list-header">
    <button id="theme-list-back-btn" data-i18n-title="common.back">←</button>
    <span data-i18n="themes.listTitle"></span>
    <button id="theme-list-new-btn" data-i18n-title="themes.newTooltip">+</button>
  </div>
  <div id="theme-list"></div>
</div>

<!-- Theme editor screen -->
<div id="theme-editor-screen" hidden>
  <div id="theme-editor-header">
    <button id="theme-editor-back-btn" data-i18n-title="common.cancel">←</button>
    <span id="theme-editor-title"></span>
  </div>
  <div id="theme-editor-body">
    <label class="settings-row"><span data-i18n="themes.nameLabel"></span>
      <input type="text" id="theme-editor-name" autocomplete="off">
    </label>
    <div id="theme-tabs">
      <button id="theme-tab-dark" class="active" data-i18n="settings.themeDark"></button>
      <button id="theme-tab-light" data-i18n="settings.themeLight"></button>
    </div>
    <div id="theme-editor-colors"></div>
  </div>
  <div class="dlg-btn-row">
    <button id="theme-editor-cancel" data-i18n="common.cancel"></button>
    <button id="theme-editor-save" class="icon-label-btn"></button>
  </div>
</div>

<!-- Duplicate theme (name prompt) -->
<dialog id="theme-dup-dlg">
  <div id="theme-dup-header">
    <span data-i18n="themes.duplicateTitle"></span>
  </div>
  <div id="theme-dup-body">
    <input type="text" id="theme-dup-name" autocomplete="off">
    <p id="theme-dup-error" class="hint"></p>
  </div>
  <div class="dlg-btn-row">
    <button id="theme-dup-cancel" data-i18n="common.cancel"></button>
    <button id="theme-dup-create" data-i18n="common.create"></button>
  </div>
</dialog>

<!-- File browser screen (active repository) -->
<div id="browser-screen" hidden>
  <div id="browser-header">
    <button id="browser-back-btn" data-i18n-title="browser.backTooltip">←</button>
    <span id="browser-title"></span>
    <button id="browser-options-btn" data-i18n-title="browser.repoOptionsTooltip">⋮</button>
    <button id="browser-repair-btn" data-i18n-title="browser.repairTooltip" class="icon-btn"></button>
    <button id="browser-new-btn" data-i18n-title="browser.newNoteTooltip">+</button>
    <button id="browser-refresh-btn" data-i18n-title="browser.refreshTooltip">⟳</button>
    <button id="browser-settings-btn" data-i18n-title="common.settings" class="icon-btn"></button>
  </div>
  <div id="browser-search-bar">
    <div id="browser-search-mode">
      <button data-mode="name" class="active" data-i18n="browser.searchName"></button>
      <button data-mode="content" data-i18n="browser.searchContent"></button>
      <button data-mode="tag" data-i18n="browser.searchTag"></button>
    </div>
    <input type="text" id="browser-search-input" data-i18n-placeholder="browser.searchPlaceholderName" autocomplete="off">
    <button id="browser-tags-btn" data-i18n-title="browser.tagsTooltip" class="icon-btn" hidden></button>
    <button id="browser-sort-btn" class="icon-btn"></button>
  </div>
  <p id="browser-empty-hint" class="hint" data-i18n="browser.emptyHintNoFiles" hidden></p>
  <div id="browser-list"></div>
</div>

<!-- Repository options -->
<dialog id="repo-options-dlg">
  <div id="repo-options-header">
    <span data-i18n="browser.repoOptionsTitle"></span>
    <button id="repo-options-close" data-i18n-title="common.close">✕</button>
  </div>
  <div id="repo-options-body">
    <label class="settings-row settings-switch-row">
      <span class="settings-row-info">
        <span data-i18n="browser.includeExtensionLabel"></span>
        <span class="settings-row-desc" data-i18n="browser.includeExtensionDesc"></span>
      </span>
      <span class="switch"><input type="checkbox" id="repo-options-include-extension"><span class="switch-track"></span></span>
    </label>
  </div>
</dialog>

<!-- Editor screen -->
<div id="editor-screen" hidden>
  <div id="ed-header">
    <button id="editor-back-btn" data-i18n-title="editor.closeTooltip">✕</button>
    <span id="editor-title"></span>
    <div id="ed-actions">
      <button id="editor-toc-btn" data-i18n-title="editor.tocTooltip" class="icon-btn"></button>
      <button id="editor-backlinks-btn" data-i18n-title="editor.backlinksTooltip" class="icon-btn">
        <span id="editor-backlinks-badge" class="editor-badge" hidden></span>
        <span id="editor-backlinks-icon"></span>
      </button>
      <button id="editor-preview-btn" data-i18n-title="editor.previewTooltip" class="icon-btn"></button>
      <button id="editor-save-btn" data-i18n-title="editor.saveTooltip" class="icon-btn" disabled></button>
      <div id="editor-menu-wrap">
        <button id="editor-menu-btn" data-i18n-title="editor.moreTooltip">⋮</button>
        <div id="editor-menu" hidden>
          <button id="editor-menu-insert-id" class="icon-label-btn"></button>
          <button id="editor-menu-insert-link" class="icon-label-btn"></button>
          <button id="editor-menu-rename" class="icon-label-btn"></button>
          <button id="editor-menu-backup-create" class="icon-label-btn"></button>
          <button id="editor-menu-backup-restore" class="icon-label-btn"></button>
          <button id="editor-menu-settings" class="icon-label-btn"></button>
        </div>
      </div>
    </div>
  </div>
  <div id="ed-body">
    <div id="ed-main">
      <div id="ed-wrap">
        <pre id="ed-highlight" aria-hidden="true"></pre>
        <textarea id="ed-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div id="ed-preview" hidden></div>
    </div>
    <!-- Panneau TOC latéral (réglage settings.tocSidebarMode) — sur le
         modèle de writhdeck-web : colonne flex fixe, jamais en surimpression.
         Reste ouvert après un clic sur un titre ; se referme via le bouton
         "✕" ou en ré-appuyant sur l'icône TOC de la barre d'outils. -->
    <div id="toc-panel" hidden>
      <div id="toc-panel-header">
        <span data-i18n="editor.tocTooltip"></span>
        <button id="toc-panel-close-btn" data-i18n-title="common.close" class="icon-btn">✕</button>
      </div>
      <p id="toc-panel-empty-hint" class="hint" data-i18n="editor.tocEmptyHint" hidden></p>
      <div id="toc-panel-list"></div>
    </div>
  </div>
</div>

<!-- Save-before-closing confirmation (Yes = save & close, No = discard & close, Cancel = stay) -->
<dialog id="close-confirm-dlg">
  <p id="close-confirm-msg"></p>
  <div class="dlg-btn-row">
    <button id="close-confirm-yes" data-i18n="editor.saveAndClose"></button>
    <button id="close-confirm-no" data-i18n="editor.closeWithoutSaving"></button>
    <button id="close-confirm-cancel" data-i18n="common.cancel"></button>
  </div>
</dialog>

<!-- Insert-link picker (filterable) -->
<dialog id="zklink-picker-dlg">
  <div id="zklink-picker-header">
    <span data-i18n="editor.insertLinkTitle"></span>
    <button id="zklink-picker-close" data-i18n-title="common.close">✕</button>
  </div>
  <input type="text" id="zklink-filter" data-i18n-placeholder="editor.linkFilterPlaceholder" autocomplete="off">
  <p id="zklink-empty-hint" class="hint" data-i18n="editor.linkEmptyHint" hidden></p>
  <div id="zklink-list"></div>
</dialog>

<!-- Backlinks panel -->
<dialog id="backlinks-dlg">
  <div id="backlinks-header">
    <span data-i18n="editor.backlinksTooltip"></span>
    <button id="backlinks-close" data-i18n-title="common.close">✕</button>
  </div>
  <p id="backlinks-empty-hint" class="hint" data-i18n="editor.backlinksEmptyHint" hidden></p>
  <div id="backlinks-list"></div>
</dialog>

<!-- Table of contents -->
<dialog id="toc-dlg">
  <div id="toc-header">
    <span data-i18n="editor.tocTooltip"></span>
    <button id="toc-close" data-i18n-title="common.close">✕</button>
  </div>
  <p id="toc-empty-hint" class="hint" data-i18n="editor.tocEmptyHint" hidden></p>
  <div id="toc-list"></div>
</dialog>

<!-- Rename note (editor's own note) -->
<dialog id="rename-note-dlg">
  <div id="rename-note-header">
    <span data-i18n="common.rename"></span>
  </div>
  <div id="rename-note-body">
    <input type="text" id="rename-note-input" autocomplete="off">
  </div>
  <div class="dlg-btn-row">
    <button id="rename-note-cancel" data-i18n="common.cancel"></button>
    <button id="rename-note-confirm" class="icon-label-btn"></button>
  </div>
</dialog>

<!-- Restore backup -->
<dialog id="backup-restore-dlg">
  <div id="backup-restore-header">
    <span data-i18n="editor.backupRestoreTitle"></span>
    <button id="backup-restore-close" data-i18n-title="common.close">✕</button>
  </div>
  <p id="backup-restore-empty-hint" class="hint" data-i18n="editor.backupEmptyHint" hidden></p>
  <div id="backup-restore-list"></div>
</dialog>

<!-- Tag browser -->
<dialog id="tag-browser-dlg">
  <div id="tag-browser-header">
    <span data-i18n="browser.tagsDlgTitle"></span>
    <button id="tag-browser-close" data-i18n-title="common.close">✕</button>
  </div>
  <p id="tag-browser-empty-hint" class="hint" data-i18n="browser.tagsEmptyHint" hidden></p>
  <div id="tag-browser-list"></div>
</dialog>

<!-- New note -->
<dialog id="new-note-dlg">
  <div id="new-note-header">
    <span data-i18n="browser.newNoteTitle"></span>
  </div>
  <div id="new-note-body">
    <input type="text" id="new-note-input" data-i18n-placeholder="browser.newNoteInputPlaceholder" autocomplete="off">
  </div>
  <div class="dlg-btn-row">
    <button id="new-note-cancel" data-i18n="common.cancel"></button>
    <button id="new-note-create" data-i18n="common.create"></button>
  </div>
</dialog>

<!-- Per-file action menu (long-press equivalent) -->
<dialog id="note-actions-dlg">
  <div id="note-actions-header">
    <span id="note-actions-title"></span>
    <button id="note-actions-close" data-i18n-title="common.close">✕</button>
  </div>
  <div id="note-actions-body">
    <button id="note-actions-rename" class="icon-label-btn"></button>
    <button id="note-actions-move" class="icon-label-btn"></button>
    <button id="note-actions-delete" class="icon-label-btn"></button>
  </div>
</dialog>

<!-- Rename note (from the browser, not the editor) -->
<dialog id="note-rename-dlg">
  <div id="note-rename-header">
    <span data-i18n="common.rename"></span>
  </div>
  <div id="note-rename-body">
    <input type="text" id="note-rename-input" autocomplete="off">
  </div>
  <div class="dlg-btn-row">
    <button id="note-rename-cancel" data-i18n="common.cancel"></button>
    <button id="note-rename-confirm" class="icon-label-btn"></button>
  </div>
</dialog>

<!-- Move note: destination repository + subfolder navigation -->
<dialog id="note-move-dlg">
  <div id="note-move-header">
    <span data-i18n="browser.moveTitle"></span>
    <button id="note-move-close" data-i18n-title="common.close">✕</button>
  </div>
  <div id="note-move-body">
    <p id="note-move-file" class="hint"></p>
    <label id="note-move-repo-row" class="settings-row" hidden><span data-i18n="browser.moveRepoLabel"></span>
      <select id="note-move-repo-select"></select>
    </label>
    <p id="note-move-breadcrumb"></p>
    <div id="note-move-list"></div>
  </div>
  <div class="dlg-btn-row">
    <button id="note-move-cancel" data-i18n="common.cancel"></button>
    <button id="note-move-confirm" data-i18n="browser.moveHereButton"></button>
  </div>
</dialog>

<!-- External modification conflict (Écraser / Recharger / Annuler) -->
<dialog id="external-conflict-dlg">
  <p id="external-conflict-msg"></p>
  <div class="dlg-btn-row">
    <button id="external-conflict-overwrite" data-i18n="editor.conflictOverwrite"></button>
    <button id="external-conflict-reload" data-i18n="editor.conflictReload"></button>
    <button id="external-conflict-cancel" data-i18n="common.cancel"></button>
  </div>
</dialog>
